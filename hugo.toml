baseURL = "https://wendaomumu.com/"
title = "文道木木"
theme = "hugo-theme-stack"
languageCode = "zh-CN"
contentDir = "content/zh"
hasCJKLanguage = true
timeZone = "Asia/Tokyo"

[menu]
  [[menu.main]]
    name = "CityWalk"
    url = "/citywalk/"
    weight = 10
    [menu.main.params]
      icon = "map"
  [[menu.main]]
    name = "内容创作者"
    url = "/creator/"
    weight = 30
    [menu.main.params]
      icon = "creator"
  [[menu.main]]
    name = "博客"
    url = "/posts/"
    weight = 40
    [menu.main.params]
      icon = "pencil"
  [[menu.main]]
    name = "关于我"
    url = "/about/"
    weight = 40
    [menu.main.params]
      icon = "user"

[params]
  mainSections = ["posts", "citywalk", "podcast"]
  featuredImageField = "image"
  rssFullContent = true

  [params.footer]
    since = 2024
    customText = "© 文道木木"

  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02 15:04"

  [params.sidebar]
    emoji = "🗺️"
    subtitle = "城市漫步 · 播客 · 技术"
    avatar = ""

  [params.article]
    math = false
    toc = true
    readingTime = true
    [params.article.share]
      enabled = true

  [[params.widgets.page]]
    type = "toc"

  [params.colorScheme]
    toggle = true
    default = "auto"

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
